        <main>
            <center><h1>Credit Card Application</h1></center>
            <form action="iciciurlserver" method="POST" name="credit card application">
                <table border="2px" align="center" cellspacing="5px" cellpadding="5px">
                    <tr>
                        <td><label for="id1">Name</label></td>
                        <td><input type="text" id="id1" name="name1"></td>
                    </tr>
                     <tr>
                        <td><label for="id2">Email</label></td>
                        <td><input type="email" id="id2" name="name2"></td>
                    </tr>
                     <tr>
                        <td><label for="id3">Phone</label></td>
                        <td><input type="tel" id="id3" name="name3"></td>
                    </tr>
                     <tr>
                        <td><label for="id4">salary</label></td>
                        <td><input type="text" id="id4" name="name4"></td>
                    </tr>
                     <tr>
                        <td><label>Employement</label></td>
                        <td><input type="radio" value="private" id="employed1" name="employee">Private
                            <input type="radio" value="Government" id="employed2" name="employee">government
                        </td>
                    </tr>
                     <tr>
                        <td><label for="id5">Resume</label></td>
                        <td><input type="file" id="id5" name="resume"></td>
                    </tr>
                     <tr>
                        <td><label for="id6">Address</label></td>
                        <td><input type="text" id="id6" name="address"></td>
                    </tr>
                     <tr>
                        <td><label>Card Type</label></td>
                        <td>
                            <select >
                                <option value="silver" id="value1" name="value">Silver</option>
                                <option value="gold" id="value2" name="value">Gold</option>
                                <option value="Platinum" id="value3" name="value">Platinum</option>
                            </select>
                        </td>
                    </tr>
                     <tr>
                        <td><input type="submit" value="submit" id="id7" name="button"></td>
                    </tr>
                </table>
            </form>

        </main>
