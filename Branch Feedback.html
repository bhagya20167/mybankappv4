        <main>
            <center>
                <h1>Branch Feedback</h1>
            </center>
            <table align="center" border="2px" cellspacing="5px" cellpadding="5px">
            <form action="iciciserverurl" method="get" name="feedback">
                <tr>
                    <td><label for="id1">Name</label></td>
                    <td><input type="text" id="id1" name="name"> </td>
                </tr>
                <tr>
                    <td><label for="id2">Email</label></td>
                    <td><input type="email" id="id2"name="email"></td>
                </tr>
                <tr>
                    <td><label for="id3">Branch</label></td>
                    <td>
                        <select id="id3", name="branch">
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Vishakapatnam">vishakapatnam</option>
                        </select>

                    </td>
                </tr>
                <tr>
                    <td><label>Rating</label></td>
                    
                    <td>
                        <input type="radio" value="Excellent" id="rate1" name="rating">Excellent
                        <input type="radio" value="Good" id="rate2" name="rating">Good
                        <input type="radio" value="Average"id="rate3" name=rating>Average
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Services Used</label></td>
                    
                    <td>
                        <input type="checkbox" value="ATM" id="service1" name="services">ATM
                        <input type="checkbox" value="Loan" id="service2" name="services">Loan
                        <input type="checkbox" value="Account" id="service3" name="services">Account
                    </td>
                </tr>
                <tr>
                    <td><label>Suggestions</label></td>
                    <td><textarea rows="3" cols="6"></textarea></td>
                    
                </tr>
                <tr>
                    <td><input type="submit" value="Submit"id="submit"name="button">&nbsp;</td>
                    <td><input type="reset" value="Reset"id="reset"name="button"></td>
            </form>
        </table>
        </main>
        <hr>
